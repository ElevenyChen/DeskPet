<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeskPet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  #cat-container {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #cat-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    pointer-events: none;
  }
  #exclamation {
    position: absolute;
    top: 2px;
    right: 8px;
    font-size: 28px;
    font-weight: 900;
    color: #FFD700;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    display: none;
    pointer-events: none;
  }
  #zzz {
    position: absolute;
    top: 5px;
    right: 5px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    display: none;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="cat-container">
  <img id="cat-img" src="sprites/idle/blink/0.png" />
  <div id="exclamation">!</div>
  <div id="zzz">z</div>
</div>
<script>
// Wait for Tauri to be ready
document.addEventListener('DOMContentLoaded', () => {
  // Small delay to ensure __TAURI__ is available
  setTimeout(initApp, 100);
});

function initApp() {
  const TAURI = window.__TAURI__;
  if (!TAURI) {
    console.error('Tauri API not available');
    return;
  }

  const { getCurrentWindow, LogicalPosition } = TAURI.window;
  const { invoke } = TAURI.core;

  const catImg = document.getElementById('cat-img');
  const exclamationEl = document.getElementById('exclamation');
  const zzzEl = document.getElementById('zzz');
  const container = document.getElementById('cat-container');

  const MANIFEST = {
    idle: { groups: { blink: 4, tail: 4 } },
    lying_down: { groups: { front: 4, side: 4 } },
    walk_right: { frames: 4 },
    walk_left: { frames: 4 },
    dragged: { groups: { front: 2, side: 2 } },
    reminder: { groups: { group1: 5, group2: 4 } },
  };

  const S = {
    IDLE: 'idle', LYING_DOWN: 'lying_down', SLEEPING: 'sleeping',
    WALK_RIGHT: 'walk_right', WALK_LEFT: 'walk_left',
    DRAGGED: 'dragged', CLICKED: 'clicked', REMINDER: 'reminder',
  };

  let state = S.IDLE, frameIdx = 0, group = null;
  let animTmr = null, behavTmr = null, zzzTmr = null, walkTmr = null;
  let idleCnt = 0, zzzStep = 0;
  let isDragging = false, dragConfirmed = false;
  let mouseStart = { x: 0, y: 0 }, lastMouse = { x: 0, y: 0 };
  let stateBeforeDrag = null;
  const DRAG_THRESH = 4;

  function spriteFolder(s) {
    if (s === S.SLEEPING) return 'lying_down';
    if (s === S.CLICKED) return 'idle';
    return s;
  }

  function pickGroup(s) {
    const e = MANIFEST[spriteFolder(s)];
    if (!e || !e.groups) return null;
    const k = Object.keys(e.groups);
    return k[Math.floor(Math.random() * k.length)];
  }

  function frameCount(s, g) {
    const e = MANIFEST[spriteFolder(s)];
    if (!e) return 0;
    if (g && e.groups && e.groups[g]) return e.groups[g];
    return e.frames || 0;
  }

  function framePath(s, g, i) {
    const f = spriteFolder(s);
    return g ? `sprites/${f}/${g}/${i}.png` : `sprites/${f}/${i}.png`;
  }

  function animInterval(s) {
    switch (s) {
      case S.SLEEPING: return 800;
      case S.LYING_DOWN: return 1000;
      case S.WALK_LEFT: case S.WALK_RIGHT: return 250;
      case S.REMINDER: return 400;
      case S.DRAGGED: return 300;
      case S.CLICKED: return 400;
      default: return 600;
    }
  }

  function setState(ns) {
    if (state === ns) return;
    state = ns;
    frameIdx = 0;
    group = pickGroup(ns);
    const cnt = frameCount(ns, group);
    if (cnt > 0) catImg.src = framePath(ns, group, 0);
    zzzEl.style.display = ns === S.SLEEPING ? 'block' : 'none';
    if (ns === S.SLEEPING) startZzz(); else stopZzz();
    exclamationEl.style.display = ns === S.CLICKED ? 'block' : 'none';
    startAnim();
  }

  function startAnim() {
    if (animTmr) clearInterval(animTmr);
    frameIdx = 0;
    const cnt = frameCount(state, group);
    if (cnt <= 1) return;
    animTmr = setInterval(() => {
      frameIdx = (frameIdx + 1) % cnt;
      catImg.src = framePath(state, group, frameIdx);
    }, animInterval(state));
  }

  function startZzz() {
    zzzStep = 0; zzzEl.textContent = 'z';
    if (zzzTmr) clearInterval(zzzTmr);
    const t = ['z', 'zZ', 'zZz'];
    zzzTmr = setInterval(() => {
      zzzStep = (zzzStep + 1) % t.length;
      zzzEl.textContent = t[zzzStep];
      zzzEl.style.opacity = zzzStep === 2 ? '0.6' : '1';
    }, 800);
  }

  function stopZzz() {
    if (zzzTmr) { clearInterval(zzzTmr); zzzTmr = null; }
    zzzEl.style.display = 'none';
  }

  // Behavior loop
  behavTmr = setInterval(() => {
    if (isDragging || state === S.DRAGGED || state === S.CLICKED || state === S.REMINDER) return;
    idleCnt++;
    if (state === S.IDLE && Math.random() < 0.1) { idleCnt = 0; walkRandom(); return; }
    if (state === S.IDLE && idleCnt >= 5) { setState(S.LYING_DOWN); return; }
    if (state === S.LYING_DOWN && idleCnt >= 10) { setState(S.SLEEPING); return; }
    if (state === S.SLEEPING && idleCnt >= 22) { idleCnt = 0; setState(S.IDLE); return; }
  }, 5000);

  // Walking
  async function walkRandom() {
    const w = getCurrentWindow();
    const pos = await w.outerPosition();
    const sz = await w.outerSize();
    let sW = 1440, sH = 900;
    try { const r = await invoke('get_screen_size'); sW = r.width; sH = r.height; } catch(e) {}
    const tx = Math.floor(Math.random() * (sW - sz.width));
    const ty = Math.floor(Math.random() * (sH - sz.height - 50)) + 25;
    setState(tx > pos.x ? S.WALK_RIGHT : S.WALK_LEFT);
    await walkTo(tx, ty);
    if (state === S.WALK_LEFT || state === S.WALK_RIGHT) { idleCnt = 0; setState(S.IDLE); }
  }

  function walkTo(tx, ty) {
    return new Promise(async (resolve) => {
      const w = getCurrentWindow();
      const pos = await w.outerPosition();
      const sx = pos.x, sy = pos.y;
      const dx = tx - sx, dy = ty - sy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const steps = Math.max(Math.floor(dist / 5), 1);
      let step = 0;
      if (walkTmr) clearInterval(walkTmr);
      walkTmr = setInterval(async () => {
        step++;
        if (step >= steps || state === S.DRAGGED || state === S.CLICKED) {
          clearInterval(walkTmr); walkTmr = null;
          if (step >= steps) {
            try { await w.setPosition(new LogicalPosition(tx, ty)); } catch(e) {}
          }
          resolve(); return;
        }
        const nx = Math.round(sx + dx * step / steps);
        const ny = Math.round(sy + dy * step / steps);
        try { await w.setPosition(new LogicalPosition(nx, ny)); } catch(e) {}
      }, 25);
    });
  }

  // Click vs Drag
  container.addEventListener('mousedown', (e) => {
    if (state === S.REMINDER) return;
    isDragging = true;
    dragConfirmed = false;
    mouseStart = { x: e.screenX, y: e.screenY };
    lastMouse = { x: e.screenX, y: e.screenY };
  });

  document.addEventListener('mousemove', async (e) => {
    if (!isDragging) return;
    const dx = e.screenX - mouseStart.x;
    const dy = e.screenY - mouseStart.y;

    if (!dragConfirmed) {
      if (Math.sqrt(dx * dx + dy * dy) < DRAG_THRESH) return;
      dragConfirmed = true;
      stateBeforeDrag = state;
      if (walkTmr) { clearInterval(walkTmr); walkTmr = null; }
      setState(S.DRAGGED);
    }

    // Move window with mouse
    const w = getCurrentWindow();
    try {
      const pos = await w.outerPosition();
      const mdx = e.screenX - lastMouse.x;
      const mdy = e.screenY - lastMouse.y;
      await w.setPosition(new LogicalPosition(pos.x + mdx, pos.y + mdy));
    } catch(ex) {}
    lastMouse = { x: e.screenX, y: e.screenY };
  });

  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    if (dragConfirmed) {
      const wasWalk = stateBeforeDrag === S.WALK_LEFT || stateBeforeDrag === S.WALK_RIGHT;
      stateBeforeDrag = null;
      idleCnt = 0;
      if (wasWalk) walkRandom(); else setState(S.IDLE);
    } else {
      // Click
      if (state === S.CLICKED) return;
      if (walkTmr) { clearInterval(walkTmr); walkTmr = null; }
      const prev = state;
      setState(S.CLICKED);
      setTimeout(() => {
        if (state !== S.CLICKED) return;
        idleCnt = 0;
        if (prev === S.WALK_LEFT || prev === S.WALK_RIGHT) walkRandom();
        else setState(S.IDLE);
      }, 1200);
    }
  });

  // Start
  setState(S.IDLE);
}
</script>
</body>
</html>
